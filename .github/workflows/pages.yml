name: Deploy dashboard to Pages

# 把 app/(靜態儀表板)發佈到 GitHub Pages。
# push 到 main 或手動觸發即重新部署。目前用 demo 資料;
# data.json 接點完成後,改由每日 workflow commit data.json 進 app/,Pages 自動更新。
on:
  push:
    branches: [main]
    paths: ["app/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - id: deploy
        uses: actions/deploy-pages@v4
