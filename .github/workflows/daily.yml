name: Daily update (free)

# 每天免費跑:抓 CoinGecko 現價、比上次快照的成本線偵測跌穿、重生 data.js、commit。
# 不碰 BigQuery、不需任何 secret(LINE 推播是選配:設了 LINE_TOKEN/LINE_TO 才推)。
# commit data.js 會觸發 pages.yml 重新部署 → 網站每天自動更新。
on:
  schedule:
    - cron: "20 1 * * *"   # 每日 UTC 01:20
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: 算現價 + 跌穿偵測 + 重生 data.js
        run: uv run python -m holder_radar.cli daily
        env:
          HOLDER_RADAR_DB: data/snapshot.sqlite
          # 推播為選配:兩組都沒設就不推(網站照常更新)。LINE 優先,否則 Telegram。
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      - name: commit 更新
        run: |
          git config user.name "holder-radar-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/assets/data.js data/snapshot.sqlite
          git commit -m "data: daily update" || echo "no change"
          git push || echo "nothing to push"
